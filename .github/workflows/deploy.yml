name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            set -e
            APP_DIR="/var/www/jivepilot-ops"
            echo "=== Pulling latest code ==="
            cd $APP_DIR
            git fetch origin
            git reset --hard origin/main

            echo "=== Installing dependencies ==="
            pnpm install --frozen-lockfile

            echo "=== Building frontend ==="
            pnpm run build

            echo "=== Restarting app ==="
            pm2 restart jivepilot-ops || pm2 start $APP_DIR/start.sh --name jivepilot-ops --interpreter bash

            echo "=== Health check ==="
            sleep 5
            PORT=$(grep '^PORT=' $APP_DIR/.env | cut -d= -f2)
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:${PORT:-3010}/)
            echo "App responded with HTTP $HTTP_CODE"
            if [ "$HTTP_CODE" != "200" ]; then
              echo "ERROR: App not responding correctly"
              pm2 logs jivepilot-ops --lines 20 --nostream
              exit 1
            fi

            echo "=== Deploy complete ==="
            pm2 status
